<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <span class="badge">Votre Santé avant tout</span>
            <h1>Calculateur d'IMC</h1>
            <p class="subtitle">Indice de Masse Corporelle — Standards OMS</p>
        </div>

        <div class="form">
            <div class="input-group">
                <label>Poids (kg)</label>
                <input type="number" id="poids" placeholder="Ex: 70">
            </div>

            <div class="input-group">
                <label>Taille (cm)</label>
                <input type="number" id="taille" placeholder="Ex: 175">
            </div>

            <button id="btn-calculer">Calculer mon IMC</button>
        </div>

        <div class="resultat" id="resultat" style="display:none;">
            <div class="imc-score" id="imc-valeur"></div>
            <div class="imc-label">Votre Indice de Masse Corporelle</div>
            <p id="categorie"></p>
            <p id="conseil"></p>
        </div>
        <footer>
            Conçu par <span>HealthTech Builder</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
